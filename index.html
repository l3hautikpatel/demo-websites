<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0f172a;
            --secondary-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, var(--bg-color), var(--secondary-bg));
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            text-align: center;
            /* Subtle entry animation */
            animation: fadeIn 1.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        h1 {
            font-size: 6rem;
            font-weight: 300;
            letter-spacing: -0.03em;
            margin: 0;
            /* Elegant text gradient */
            background: linear-gradient(to bottom right, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }

        h1:hover {
            transform: scale(1.02);
        }

        .dot {
            color: var(--accent-color);
            -webkit-text-fill-color: var(--accent-color);
            display: inline-block;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes fadeIn {
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% { 
                transform: scale(1);
                opacity: 1; 
                text-shadow: 0 0 0 rgba(56, 189, 248, 0);
            }
            50% { 
                transform: scale(1.1); 
                opacity: 0.8; 
                text-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 4rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello<span class="dot">.</span></h1>
    </div>
</body>
</html>
